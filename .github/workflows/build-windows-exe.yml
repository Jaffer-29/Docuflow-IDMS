name: Build Windows EXE

# Builds the native Windows executable in the cloud on a Windows runner,
# so you get a real .exe without needing a Windows machine yourself.
# Trigger manually from the Actions tab, or by pushing a v* tag.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build with Maven
        run: mvn -q clean package -DskipTests

      - name: Package Windows executable
        run: >
          jpackage
          --type app-image
          --name DocuFlow
          --input target/app
          --main-jar idms-1.0-SNAPSHOT.jar
          --main-class ds.comsats.idms.idms.Launcher
          --icon src/main/resources/Logo.ico
          --app-version 1.0
          --vendor "COMSATS IDMS"
          --dest target/dist

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: DocuFlow-windows
          path: target/dist/DocuFlow
